name: Facebook Automation with Playwright

on:
  workflow_dispatch:  # Manual trigger (recommended for sensitive automation)
  # schedule:
  #   - cron: '0 10 * * *'   # Example: daily at 10 AM UTC

jobs:
  run-facebook-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Decode cookies secret to file
        env:
          FB_COOKIES_BASE64: ${{ secrets.FB_COOKIES_BASE64 }}
        run: |
          echo "$FB_COOKIES_BASE64" | base64 -d > facebook_cookies.json
          echo "Cookies file created successfully."

      - name: Run Facebook script
        env:
          # Add any other environment variables your script needs
          TZ: "Asia/Karachi"
        run: python main.py   # Change to your script name if different

      - name: Upload artifacts (screenshots, logs, etc.)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-run-artifacts
          path: |
            *.png
            *.log
            facebook_cookies.json
            playwright-report/
          retention-days: 7
