name: Facebook Automation

on:
  workflow_dispatch:

jobs:
  facebook-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Decode Cookies
        env:
          FB_COOKIES_BASE64: ${{ secrets.FB_COOKIES_BASE64 }}
        run: |
          echo "$FB_COOKIES_BASE64" | base64 -d > facebook_cookies.json
          echo "✅ Cookies file created"

      - name: Run Facebook Script
        env:
          TZ: "Asia/Karachi"
        run: python main.py

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-results
          path: |
            *.png
            facebook_cookies.json
          retention-days: 7
